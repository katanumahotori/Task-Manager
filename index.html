<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111118">
<title>Tasks</title>
<style>
  body{font-family:sans-serif;background:#111118;color:#a0a0c0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
</style>
</head>
<body>
<p id="s">読み込み中...</p>
<script>
(async () => {
  const s = document.getElementById('s');
  try {
    // 古いSWとキャッシュを削除
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      for (const k of keys) await caches.delete(k);
    }

    const res = await fetch('https://api.pcloud.com/getpublinkdownload?code=XZnKX65ZkqtBn3zqgdY0HPwExoHfSzU72GLX', { referrerPolicy: 'no-referrer' });
    const data = await res.json();
    if (data.result !== 0) throw new Error(data.error);
    window.location.replace('https://' + data.hosts[0] + data.path);
  } catch (e) {
    s.textContent = 'エラー: ' + e.message;
  }
})();
</script>
</body>
</html>
