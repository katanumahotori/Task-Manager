<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111118">
<title>Tasks</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111118;color:#f0f0f8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .msg{text-align:center;padding:20px}
</style>
</head>
<body>
<div class="msg">
  <p id="status">読み込み中...</p>
</div>
<script>
(async () => {
  const s = document.getElementById('status');
  try {
    // Unregister old service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    // Clear old caches
    if ('caches' in window) {
      const keys = await caches.keys();
      for (const k of keys) await caches.delete(k);
    }

    // Get fresh CDN URL for the real app hosted on pCloud
    const code = 'XZIXk65ZQvsNc00vubRyduVpSrzzk5QVO6ny';
    const res = await fetch(`https://api.pcloud.com/getpublinkdownload?code=${code}`);
    const data = await res.json();
    if (data.result !== 0) throw new Error(data.error);
    const url = `https://${data.hosts[0]}${data.path}`;
    window.location.replace(url);
  } catch (e) {
    s.textContent = 'エラー: ' + e.message;
  }
})();
</script>
</body>
</html>
