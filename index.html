<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111118">
<title>Tasks</title>
<style>
  :root{--bg:#111118;--bg-raised:#22223a;--bg-input:#2a2a40;--border:#3a3a56;--border-focus:#5865f2;--text:#f0f0f8;--text-sub:#a0a0c0;--text-muted:#8888a0;--accent:#5865f2;--accent-hover:#4752c4;--err-bg:rgba(240,71,71,.18);--err-fg:#f47c7c}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px}
  #status{color:var(--text-sub)}
  #appFrame{position:fixed;top:0;left:0;width:100%;height:100%;border:none;display:none;z-index:100}
  .login-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.25);display:none}
  .login-card h1{font-size:1.3rem;margin-bottom:4px}
  .login-card .sub{font-size:0.8rem;color:var(--text-muted);margin-bottom:20px}
  .login-card label{display:block;font-size:0.78rem;font-weight:600;color:var(--text-sub);margin:12px 0 4px}
  .login-card input,.login-card select{width:100%;padding:10px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.9rem;outline:none}
  .login-card input:focus,.login-card select:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(88,101,242,.15)}
  .login-card .hint{font-size:0.7rem;color:var(--text-muted);margin-top:4px}
  .btn{width:100%;margin-top:20px;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--accent-hover)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .err{margin-top:12px;padding:8px 12px;background:var(--err-bg);color:var(--err-fg);border-radius:6px;font-size:0.8rem;display:none}
</style>
</head>
<body>
<p id="status">読み込み中...</p>
<iframe id="appFrame"></iframe>
<div class="login-card" id="loginCard">
  <h1>Task Manager</h1>
  <p class="sub">pCloudアカウントでログインしてデータを同期</p>
  <label>メールアドレス</label>
  <input type="email" id="email" autocomplete="email">
  <label>パスワード</label>
  <input type="password" id="pass" autocomplete="current-password">
  <label>データベースのパス (pCloud内)</label>
  <input type="text" id="dbPath" value="/Obsidian/90_tools/task-manager/tasks.db">
  <div class="hint">pCloudアプリで対象ファイルのパスを確認してください</div>
  <label>サーバー地域</label>
  <select id="region">
    <option value="US">アメリカ (api.pcloud.com)</option>
    <option value="EU">ヨーロッパ (eapi.pcloud.com)</option>
  </select>
  <button class="btn" id="loginBtn">ログイン</button>
  <div class="err" id="err"></div>
</div>

<script>
const PCLOUD = { US: 'https://api.pcloud.com', EU: 'https://eapi.pcloud.com' };
const PUB_CODE = 'XZnKX65ZkqtBn3zqgdY0HPwExoHfSzU72GLX';

async function sha1hex(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-1', buf);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin(email, password, apiBase) {
  const dRes = await fetch(`${apiBase}/getdigest`, { referrerPolicy: 'no-referrer' });
  const dData = await dRes.json();
  if (dData.result !== 0) throw new Error('Failed to get digest');
  const userHash = await sha1hex(email.toLowerCase());
  const pwDigest = await sha1hex(password + userHash + dData.digest);
  const params = new URLSearchParams({
    getauth: '1', username: email, digest: dData.digest, passworddigest: pwDigest,
    authexpire: '63072000', authinactiveexpire: '5356800',
  });
  const res = await fetch(`${apiBase}/userinfo`, { method: 'POST', body: params, referrerPolicy: 'no-referrer' });
  const data = await res.json();
  if (data.result !== 0) throw new Error(data.error || 'Login failed');
  return data.auth;
}

async function loadApp(config) {
  document.getElementById('status').textContent = 'アプリを読み込み中...';
  document.getElementById('status').style.display = '';
  document.getElementById('loginCard').style.display = 'none';

  const res = await fetch('https://api.pcloud.com/getpublinkdownload?code=' + PUB_CODE, { referrerPolicy: 'no-referrer', cache: 'no-store' });
  const data = await res.json();
  if (data.result !== 0) throw new Error(data.error);
  const url = 'https://' + data.hosts[0] + data.path;

  const frame = document.getElementById('appFrame');
  frame.src = url + '#' + btoa(JSON.stringify(config));
  frame.style.display = 'block';
  document.getElementById('status').style.display = 'none';
  appLoadTime = Date.now();
}

// iframeからのログイン要求を受信（クロスオリジンでも確実に動作）
let appLoadTime = 0;
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'goToLogin') {
    // ログイン直後（15秒以内）はリトライする（一時的なエラーの可能性が高い）
    if (appLoadTime > 0 && Date.now() - appLoadTime < 15000) {
      appLoadTime = 0; // 無限リトライ防止
      const saved = localStorage.getItem('taskManagerConfig');
      if (saved) {
        loadApp(JSON.parse(saved)).catch(() => {});
        return;
      }
    }
    localStorage.removeItem('taskManagerConfig');
    location.href = location.pathname;
  }
});

(async () => {
  // 旧app.htmlがiframe内にこのページを読み込んだ場合、親ページを遷移させて脱出
  if (window !== window.top) {
    try { window.top.location.href = location.href; } catch(_) {}
    return;
  }

  // 古いSWとキャッシュを削除
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) await r.unregister();
  }
  if ('caches' in window) {
    const keys = await caches.keys();
    for (const k of keys) await caches.delete(k);
  }

  // 再ログイン要求で戻ってきた場合
  if (location.search.includes('relogin')) {
    localStorage.removeItem('taskManagerConfig');
    history.replaceState(null, '', location.pathname);
  }

  // 保存済みの認証情報があればそのままリダイレクト
  const saved = localStorage.getItem('taskManagerConfig');
  if (saved) {
    try {
      await loadApp(JSON.parse(saved));
      return;
    } catch (e) {
      localStorage.removeItem('taskManagerConfig');
    }
  }

  // ログインフォームを表示
  document.getElementById('status').style.display = 'none';
  document.getElementById('loginCard').style.display = 'block';

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('pass').value;
    const dbPath = document.getElementById('dbPath').value.trim();
    const region = document.getElementById('region').value;
    const errEl = document.getElementById('err');
    const btn = document.getElementById('loginBtn');

    if (!email || !password || !dbPath) {
      errEl.textContent = 'すべての項目を入力してください';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'ログイン中...';
    errEl.style.display = 'none';

    try {
      const apiBase = PCLOUD[region];
      const token = await doLogin(email, password, apiBase);
      const config = { token, apiBase, dbPath };
      localStorage.setItem('taskManagerConfig', JSON.stringify(config));
      await loadApp(config);
    } catch (e) {
      errEl.textContent = e.message || 'ログインに失敗しました';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ログイン';
    }
  });
})();
</script>
</body>
</html>
