<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Reset</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px;text-align:center">
<h2>キャッシュをリセット中...</h2>
<p id="status">処理中...</p>
<script>
(async () => {
  const s = document.getElementById('status');
  try {
    // Unregister all service workers
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) await r.unregister();
    s.textContent = `SW ${regs.length}件を解除`;

    // Clear all caches
    const keys = await caches.keys();
    for (const k of keys) await caches.delete(k);
    s.textContent += ` / キャッシュ ${keys.length}件を削除`;

    // Clear localStorage
    localStorage.clear();
    s.textContent += ' / localStorage削除';

    s.textContent += ' ／ 完了！3秒後にリダイレクトします...';
    setTimeout(() => { window.location.href = './index.html'; }, 3000);
  } catch (e) {
    s.textContent = 'エラー: ' + e.message;
  }
})();
</script>
</body></html>
